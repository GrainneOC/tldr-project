apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tldr-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/grainneoc/tldr-project.git
    targetRevision: main              
    path: tldr-app-chart              
    helm:
      valueFiles:
        - values.yaml               
  destination:
    server: https://kubernetes.default.svc
    namespace: tldr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

