name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          if [ -d tests ]; then pytest -q; else echo "No tests yet"; fi

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd tldr-app
          docker build -t tldr-app:ci-build .

  trivy-scan:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: |
          cd tldr-app
          docker build -t tldr-app:ci-build .

      - name: Run Trivy scan (JSON)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'tldr-app:ci-build'
          format: 'json'
          output: 'trivy-report.json'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          ignore-unfixed: true
          exit-code: '0'   # for comparison runs; later switch to 1

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  grype-scan:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          cd tldr-app
          docker build -t tldr-app:ci-build .

      - name: Scan with Grype via Anchore action
        uses: anchore/scan-action@v6
        with:
          image: "tldr-app:ci-build"
          fail-build: false          # false until it works and further configuration is added
          output-format: json
          output-file: grype-report.json

      - name: Upload Grype report
        uses: actions/upload-artifact@v4
        with:
          name: grype-report
          path: grype-report.json

