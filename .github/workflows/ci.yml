permissions:
  contents: write

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          if [ -d tests ]; then pytest -q; else echo "No tests yet"; fi

  scan-images:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: tldr-app
            image: tldr-app:ci-build
            kind: cd
          - label: alpine
            image: alpine:3.18
            kind: ci
          - label: debian
            image: debian:12
            kind: ci
          - label: python
            image: python:3.14-slim
            kind: ci

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build app image
        if: matrix.kind == 'cd'
        run: |
          cd tldr-app
          docker build -t tldr-app:ci-build .

      - name: Pull base image
        if: matrix.kind == 'ci'
        run: docker pull ${{ matrix.image }}

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Run Trivy scan (JSON)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.image }}
          format: json
          output: reports/trivy-report.json
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM,LOW
          ignore-unfixed: true
          exit-code: 0

      - name: Run Grype scan (JSON)
        uses: anchore/scan-action@v6
        with:
          image: ${{ matrix.image }}
          fail-build: false
          severity-cutoff: critical
          output-format: json
          output-file: reports/grype-report.json

      - name: Upload scan reports
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ matrix.kind }}-${{ matrix.label }}
          path: |
            reports/trivy-report.json
            reports/grype-report.json

  normalize-reports:
    runs-on: ubuntu-latest
    needs: scan-images

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: scan-results-*
          path: reports
          merge-multiple: true

      - name: Normalise Trivy report
        run: python scripts/normalize_trivy.py

      - name: Normalise Grype report
        run: python scripts/normalize_grype.py

      - name: Compare overlap
        run: python scripts/compare.py

      - name: Upload normalised CSVs
        uses: actions/upload-artifact@v4
        with:
          name: normalized-reports
          path: |
            reports/trivy-normalized.csv
            reports/grype-normalized.csv

  policy-check:
    runs-on: ubuntu-latest
    needs: normalize-reports

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Download normalised reports
        uses: actions/download-artifact@v4
        with:
          name: normalized-reports
          path: reports

      - name: Run policy check
        run: python scripts/policy-fail-critical.py reports/trivy-normalized.csv reports/grype-normalized.csv

      - name: Upload fixable report
        uses: actions/upload-artifact@v4
        with:
          name: fixable-report
          path: reports/fixable-findings.json

