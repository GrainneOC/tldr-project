name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          if [ -d tests ]; then pytest -q; else echo "No tests yet"; fi

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd tldr-app
          docker build -t tldr-app:ci-build .

  trivy-scan:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: |
          cd tldr-app
          docker build -t tldr-app:ci-build .

      - name: Run Trivy scan (JSON)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'tldr-app:ci-build'
          format: 'json'
          output: 'reports/trivy-report.json'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          ignore-unfixed: false
          exit-code: '0'   # for comparison runs; later switch to 1

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: reports/trivy-report.json

  grype-scan:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          cd tldr-app
          docker build -t tldr-app:ci-build .

      - name: Scan with Grype via Anchore action
        uses: anchore/scan-action@v6
        with:
          image: "tldr-app:ci-build"
          fail-build: false          # false until it works and further configuration is added
          severity-cutoff: high
          output-format: json
          output-file: reports/grype-report.json

      - name: Upload Grype report
        uses: actions/upload-artifact@v4
        with:
          name: grype-report
          path: reports/grype-report.json

  normalize-reports:
    runs-on: ubuntu-latest
    needs: [trivy-scan, grype-scan]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download Trivy report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report
          path: reports

      - name: Download Grype report
        uses: actions/download-artifact@v4
        with:
          name: grype-report
          path: reports

      - name: Normalise Trivy report
        run: python scripts/normalize_trivy.py

      - name: Normalise Grype report
        run: python scripts/normalize_grype.py

      - name: Save app Trivy normalized CSV with app label
        run: cp reports/trivy-normalized.csv reports/trivy-normalized-tldr-app.csv

      - name: Save app Grype normalized CSV with app label
        run: cp reports/grype-normalized.csv reports/grype-normalized-tldr-app.csv

      - name: Compare overlap
        run: python scripts/compare.py

      - name: Upload normalised CSVs
        uses: actions/upload-artifact@v4
        with:
          name: normalized-reports
          path: |
            reports/trivy-normalized.csv
            reports/grype-normalized.csv
            reports/trivy-normalized-tldr-app.csv
            reports/grype-normalized-tldr-app.csv
            

  policy-check:
    runs-on: ubuntu-latest
    needs: normalize-reports

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Download normalised reports
        uses: actions/download-artifact@v4
        with:
          name: normalized-reports
          path: reports

      - name: Run policy check
        run: python scripts/policy-fail-critical.py reports/trivy-normalized.csv reports/grype-normalized.csv

      - name: Upload fixable report
        uses: actions/upload-artifact@v4
        with:
          name: fixable-report
          path: reports/fixable-findings.json

  publish-image:
    runs-on: ubuntu-latest
    needs: policy-check
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: grainneoc/tldr-app
      IMAGE_ID: ghcr.io/grainneoc/tldr-app:${{ github.sha }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: |
          cd tldr-app
          docker build -t $IMAGE_ID .

      - name: Push image to GHCR
        run: docker push $IMAGE_ID

      - name: Update Helm values image tag
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path("tldr-app-chart/values.yaml")
          data = yaml.safe_load(path.read_text())
          data["image"]["tag"] = "${{ github.sha }}"
          path.write_text(yaml.safe_dump(data, sort_keys=False))
          PY

      - name: Commit and push updated values  
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tldr-app-chart/values.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || exit 0
          git push origin HEAD:main

      - name: Commit and push updated values
        run: echo "Committed by yaml-update-action"    
