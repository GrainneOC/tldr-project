  normalize-reports:
    runs-on: ubuntu-latest
    needs: scan-image

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download scan artifact
        uses: actions/download-artifact@v4
        with:
          name: scan-results-app
          path: reports

      - name: Show downloaded files
        run: |
          pwd
          find reports -maxdepth 3 -type f | sort

      - name: Inspect Trivy JSON size
        run: |
          echo "Results count:"
          jq '.Results | length' reports/trivy-report.json || echo "jq failed"
          echo "First result vuln count:"
          jq '.Results[0].Vulnerabilities | length' reports/trivy-report.json || echo "jq failed for vulns"

      - name: Normalise Trivy report
        run: python scripts/normalize_trivy.py

      - name: Normalise Grype report
        run: python scripts/normalize_grype.py

      - name: Compare overlap
        run: python scripts/compare.py

      - name: Upload normalised CSVs
        uses: actions/upload-artifact@v4
        with:
          name: normalized-reports
          path: |
            reports/trivy-normalized.csv
            reports/grype-normalized.csv
            reports/overlap-report.csv
            reports/scan-times.csv
